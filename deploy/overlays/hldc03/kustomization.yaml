apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: jira-triage-agent

# ── Image management ──────────────────────────────────────────────────────────
# Update newTag here when deploying new versions.
images:
  - name: jira-triage-agent
    newName: artifactory-kfs.habana-labs.com/docker-developers/users/dweinsto/jira-triage-agent
    newTag: "latest"
  - name: jira-triage-langgraph
    newName: artifactory-kfs.habana-labs.com/docker-developers/users/dweinsto/jira-triage-langgraph
    newTag: "latest"

# ── Patches ───────────────────────────────────────────────────────────────────
patches:
  # Restrict vLLM to schedulable Gaudi 3 nodes (any such node works — the
  # habana.ai/* labels on the pod let the device plugin allocate a card there).
  - target:
      kind: Deployment
      name: vllm-qwen3
    patch: |-
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          habana.ai/device-type: gaudi3
          habana.ai/schedulable: "true"
