apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen3
  labels:
    app: vllm-qwen3
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-qwen3
  template:
    metadata:
      labels:
        app: vllm-qwen3
    spec:
      runtimeClassName: habana
      hostIPC: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: vllm
        # Verified image from internal registry (SynapseAI 1.24.0, vLLM-gaudi plugin).
        # Qwen3.6-27B-FP8 (~27GB weights) fits comfortably on a single Gaudi card.
        image: artifactory-kfs.habana-labs.com/docker-developers/vllm/1.24.0/ubuntu22.04/habanalabs/external/vllm-plugin-2.9.1:1.24.0-481
        command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
        args:
        - "--model=Qwen/Qwen3.6-27B-FP8"
        - "--tensor-parallel-size=1"
        - "--block-size=128"
        - "--max-model-len=8192"
        - "--port=8000"
        - "--gpu-memory-utilization=0.90"
        # Disable chain-of-thought reasoning by default for faster triage evaluation.
        # Agents may override per-prompt with /no_think or /think.
        - "--chat-template-kwargs={\"enable_thinking\": false}"
        env:
        - name: HABANA_VISIBLE_DEVICES
          value: "all"
        - name: OMPI_MCA_btl_vader_single_copy_mechanism
          value: "none"
        - name: VLLM_WORKER_MULTIPROC_METHOD
          value: "spawn"
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: jira-triage-agent-secret
              key: huggingface-token
              optional: true   # model may already be cached
        - name: HF_HOME
          value: /root/.cache/huggingface
        - name: HTTP_PROXY
          valueFrom:
            configMapKeyRef:
              name: proxy-config
              key: HTTP_PROXY
              optional: true
        - name: HTTPS_PROXY
          valueFrom:
            configMapKeyRef:
              name: proxy-config
              key: HTTPS_PROXY
              optional: true
        - name: NO_PROXY
          valueFrom:
            configMapKeyRef:
              name: proxy-config
              key: NO_PROXY
              optional: true
        resources:
          limits:
            habana.ai/gaudi: "1"
            hugepages-2Mi: "2500Mi"
            memory: "100Gi"
            cpu: "20"
          requests:
            habana.ai/gaudi: "1"
            hugepages-2Mi: "2500Mi"
            memory: "60Gi"
            cpu: "10"
        securityContext:
          capabilities:
            add: ["SYS_NICE", "IPC_LOCK"]
        ports:
        - containerPort: 8000
          name: http
        volumeMounts:
        - name: model-cache
          mountPath: /root/.cache/huggingface
        - name: dshm
          mountPath: /dev/shm
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 120
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: "5Gi"
      - name: model-cache
        hostPath:
          path: /tmp/vllm-model-cache
          type: DirectoryOrCreate
