apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - rbac.yaml
  - proxy-configmap.yaml
  - externalsecret.yaml
  - externalsecret-kubeconfigs.yaml

# ── Image management ──────────────────────────────────────────────────────────
# Change newTag (or newName) here to update the jira-agent image.
images:
  - name: jira-triage-agent
    newName: artifactory-kfs.habana-labs.com/docker-developers/users/dweinsto/jira-triage-agent
    newTag: "latest"
