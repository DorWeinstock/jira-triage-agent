apiVersion: apps/v1
kind: Deployment
metadata:
  name: jira-agent
  namespace: jira-k8s-agent
  labels:
    app: jira-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jira-agent
  template:
    metadata:
      labels:
        app: jira-agent
    spec:
      serviceAccountName: jira-agent-sa
      containers:
      - name: jira-agent
        image: jira-triage-agent  # resolved by kustomize images: in kustomization.yaml
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        envFrom:
        - configMapRef:
            name: triage-config   # Jira filters, team, polling, LLM config
        env:
        - name: PORT
          value: "8080"
        - name: AGENT_URL
          value: "http://langgraph-agent-service:8000"
        - name: LOG_FORMAT
          value: "json"
        - name: LOG_LEVEL
          value: "info"
        # Jira credentials (self-hosted — PAT Bearer token auth)
        - name: JIRA_URL
          valueFrom:
            secretKeyRef:
              name: jira-triage-agent-secret
              key: jira-url
        - name: JIRA_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: jira-triage-agent-secret
              key: jira-api-token
        # Proxy
        - name: HTTP_PROXY
          valueFrom:
            configMapKeyRef:
              name: proxy-config
              key: HTTP_PROXY
              optional: true
        - name: HTTPS_PROXY
          valueFrom:
            configMapKeyRef:
              name: proxy-config
              key: HTTPS_PROXY
              optional: true
        - name: NO_PROXY
          valueFrom:
            configMapKeyRef:
              name: proxy-config
              key: NO_PROXY
              optional: true
        resources:
          limits:
            memory: 256Mi
            cpu: 250m
          requests:
            cpu: 100m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 30
