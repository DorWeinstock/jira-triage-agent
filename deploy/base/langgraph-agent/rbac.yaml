---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: langgraph-agent-sa
  namespace: jira-k8s-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: langgraph-agent-role
rules:
# Existing permissions for K8s investigation
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list"]
# NEW: Checkpoint ConfigMap permissions
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: langgraph-agent-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: langgraph-agent-role
subjects:
- kind: ServiceAccount
  name: langgraph-agent-sa
  namespace: jira-k8s-agent
