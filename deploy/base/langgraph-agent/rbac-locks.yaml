# RBAC for remediation lock ConfigMap access
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: langgraph-lock-manager
  namespace: jira-k8s-agent
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["langgraph-remediation-locks"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create"]  # For initial ConfigMap creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: langgraph-lock-manager-binding
  namespace: jira-k8s-agent
subjects:
  - kind: ServiceAccount
    name: langgraph-agent
    namespace: jira-k8s-agent
roleRef:
  kind: Role
  name: langgraph-lock-manager
  apiGroup: rbac.authorization.k8s.io
