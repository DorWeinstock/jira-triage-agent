apiVersion: apps/v1
kind: Deployment
metadata:
  name: langgraph-agent
  namespace: jira-k8s-agent
  labels:
    app: langgraph-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langgraph-agent
  template:
    metadata:
      labels:
        app: langgraph-agent
    spec:
      serviceAccountName: langgraph-agent-sa
      nodeSelector:
        habana.ai/services: "true"
      containers:
      - name: langgraph-agent
        image: jira-triage-langgraph  # resolved by kustomize images: in kustomization.yaml
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: triage-config   # Jira filters, team, LLM config, LangSmith
        env:
        - name: PORT
          value: "8000"
        - name: JIRA_MCP_ENDPOINT
          value: "http://jira-agent:8080/mcp/jira"
        # LangSmith API key (optional — tracing disabled if absent)
        - name: LANGCHAIN_API_KEY
          valueFrom:
            secretKeyRef:
              name: jira-triage-agent-secret
              key: langchain-api-key
              optional: true
        # Proxy (trailing dot = absolute FQDN, avoids ndots:5 search-domain
        # resolution failures on hldc03 — see proxy-config ConfigMap).
        - name: HTTP_PROXY
          value: "http://proxy-dmz.intel.com.:912"
        - name: HTTPS_PROXY
          value: "http://proxy-dmz.intel.com.:912"
        - name: NO_PROXY
          value: "10.96.0.1,10.233.0.1,kubernetes,kubernetes.default,kubernetes.default.svc,kubernetes.default.svc.cluster.local,10.0.0.0/8,habana-labs.com,.habana-labs.com,intel.com,.intel.com,127.0.0.1,localhost,jira-agent,vllm-service,.svc,.svc.cluster.local"
        - name: no_proxy
          value: "10.96.0.1,10.233.0.1,kubernetes,kubernetes.default,kubernetes.default.svc,kubernetes.default.svc.cluster.local,10.0.0.0/8,habana-labs.com,.habana-labs.com,intel.com,.intel.com,127.0.0.1,localhost,jira-agent,vllm-service,.svc,.svc.cluster.local"
        resources:
          limits:
            memory: 1Gi
            cpu: 1000m
          requests:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: langgraph-agent-service
  namespace: jira-k8s-agent
spec:
  selector:
    app: langgraph-agent
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  type: ClusterIP
