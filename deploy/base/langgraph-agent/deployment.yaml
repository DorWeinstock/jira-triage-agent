apiVersion: apps/v1
kind: Deployment
metadata:
  name: langgraph-agent
  namespace: jira-k8s-agent
  labels:
    app: langgraph-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langgraph-agent
  template:
    metadata:
      labels:
        app: langgraph-agent
    spec:
      serviceAccountName: langgraph-agent-sa
      containers:
      - name: langgraph-agent
        image: artifactory-kfs.habana-labs.com/docker-developers/users/dweinsto/jira-triage-langgraph:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: PORT
          value: "8000"
        - name: JIRA_MCP_ENDPOINT
          value: "http://jira-agent:8080/mcp/jira"
        # LLM configuration (Qwen3-Next-80B on vLLM/Gaudi)
        - name: VLLM_ENDPOINT
          value: "http://vllm-service:8000/v1"
        - name: VLLM_MODEL_NAME
          value: "Qwen/Qwen3.6-27B-FP8"
        # Triage team
        - name: TEAM_MEMBERS
          value: "dweinsto,davidtal,gennadyd"
        - name: PROCESSED_LABEL
          value: "triage-agent-done"
        # LangSmith observability (optional — leave LANGCHAIN_API_KEY empty to disable)
        - name: LANGCHAIN_TRACING_V2
          value: "false"
        - name: LANGCHAIN_PROJECT
          value: "jira-triage-agent"
        - name: LANGCHAIN_API_KEY
          valueFrom:
            secretKeyRef:
              name: jira-triage-agent-secret
              key: langchain-api-key
              optional: true
        # Proxy (needed for HuggingFace model download on first run)
        - name: HTTP_PROXY
          value: "http://proxy-dmz.intel.com:912"
        - name: HTTPS_PROXY
          value: "http://proxy-dmz.intel.com:912"
        - name: NO_PROXY
          value: "10.96.0.1,10.233.0.1,kubernetes,kubernetes.default,kubernetes.default.svc,kubernetes.default.svc.cluster.local,10.0.0.0/8,habana-labs.com,.habana-labs.com,intel.com,.intel.com,127.0.0.1,localhost,jira-agent,vllm-service,.svc,.svc.cluster.local"
        - name: no_proxy
          value: "10.96.0.1,10.233.0.1,kubernetes,kubernetes.default,kubernetes.default.svc,kubernetes.default.svc.cluster.local,10.0.0.0/8,habana-labs.com,.habana-labs.com,intel.com,.intel.com,127.0.0.1,localhost,jira-agent,vllm-service,.svc,.svc.cluster.local"
        resources:
          limits:
            memory: 1Gi
            cpu: 1000m
          requests:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: langgraph-agent-service
  namespace: jira-k8s-agent
spec:
  selector:
    app: langgraph-agent
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  type: ClusterIP
