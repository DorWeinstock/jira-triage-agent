# Example secrets template - DO NOT commit with real values
# This file is for reference only. Create secrets using kubectl create secret
# or your organization's secret management system.

---
apiVersion: v1
kind: Secret
metadata:
  name: jira-k8s-agent-secret
  namespace: jira-k8s-agent
type: Opaque
stringData:
  jira-url: "https://your-domain.atlassian.net"
  jira-email: "your-email@example.com"
  jira-api-token: "YOUR_JIRA_API_TOKEN_HERE"
  huggingface-token: "YOUR_HUGGINGFACE_TOKEN_HERE"
  jenkins-username: "YOUR_JENKINS_USERNAME_HERE"
  jenkins-api-token: "YOUR_JENKINS_API_TOKEN_HERE"
  langchain-api-key: "YOUR_LANGSMITH_API_KEY_HERE"
