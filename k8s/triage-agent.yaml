---
apiVersion: v1
kind: Secret
metadata:
  name: triage-agent-secrets
  namespace: jira-triage-agent
type: Opaque
stringData:
  JIRA_USERNAME: "your-intel-username"
  JIRA_PASSWORD: "your-intel-password"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: triage-agent
  namespace: jira-triage-agent
  labels:
    app: triage-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: triage-agent
  template:
    metadata:
      labels:
        app: triage-agent
    spec:
      containers:
        - name: triage-agent
          image: your-registry/jira-triage-agent:latest
          env:
            - name: JIRA_URL
              value: "https://jira.devtools.intel.com"
            - name: JIRA_PROJECT
              value: "GAUDISW"
            - name: JIRA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: triage-agent-secrets
                  key: JIRA_USERNAME
            - name: JIRA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: triage-agent-secrets
                  key: JIRA_PASSWORD
            - name: TEAM_MEMBERS
              value: "dweinsto,davidtal,gennadyd"
            - name: PROCESSED_LABEL
              value: "triage-agent-done"
            - name: POLL_INTERVAL
              value: "5m"
            - name: LLM_ENDPOINT
              value: "http://vllm.jira-triage-agent.svc.cluster.local:8000"
            - name: LLM_MODEL
              value: "Qwen/Qwen3-Next-80B-A3B-Instruct-FP8"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
