---
apiVersion: v1
kind: Namespace
metadata:
  name: jira-triage-agent

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-model-cache
  namespace: jira-triage-agent
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 200Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: jira-triage-agent
  labels:
    app: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      nodeSelector:
        habana.ai/device-type: gaudi3
      containers:
        - name: vllm
          # SynapseAI version must match the node's habana.ai/container-runtime label (currently 1.19.0).
          # Verify: kubectl --context hldc03 get node <node> -o jsonpath='{.metadata.labels.habana\.ai/container-runtime}'
          image: vault.habana.ai/gaudi-docker/1.19.0/ubuntu22.04/habanalabs/vllm-fork:latest
          command:
            - python3
            - -m
            - vllm.entrypoints.openai.api_server
            - --model
            - Qwen/Qwen3-Next-80B-A3B-Instruct-FP8
            - --device
            - hpu
            - --dtype
            - auto
            - --tensor-parallel-size
            - "1"
            - --max-model-len
            - "8192"
            - --port
            - "8000"
            - --host
            - "0.0.0.0"
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: HF_HOME
              value: /data/hf-cache
          resources:
            limits:
              habana.ai/gaudi: 1
            requests:
              habana.ai/gaudi: 1
          volumeMounts:
            - name: model-cache
              mountPath: /data/hf-cache
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 180
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: vllm-model-cache

---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: jira-triage-agent
spec:
  selector:
    app: vllm
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
