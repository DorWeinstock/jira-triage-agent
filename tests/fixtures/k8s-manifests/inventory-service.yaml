apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: production
  labels:
    app: inventory-service
spec:
  replicas: 0
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
      - name: inventory-api
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          limits:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: production
spec:
  selector:
    app: inventory-service
  ports:
  - port: 80
    targetPort: 80
