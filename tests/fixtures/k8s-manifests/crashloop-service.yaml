apiVersion: v1
kind: ConfigMap
metadata:
  name: crashloop-config
  namespace: production
data:
  DATABASE_URL: "postgres://db:5432/test"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloop-service
  namespace: production
  labels:
    app: crashloop-service
spec:
  replicas: 0
  selector:
    matchLabels:
      app: crashloop-service
  template:
    metadata:
      labels:
        app: crashloop-service
    spec:
      containers:
      - name: crashloop-api
        image: busybox:latest
        command:
        - sh
        - -c
        - |
          if [ -z "$DATABASE_URL" ]; then
            echo "ERROR: Missing required environment variable DATABASE_URL" >&2
            exit 1
          fi
          echo "Config OK: DATABASE_URL is set"
          while true; do sleep 3600; done
        envFrom:
        - configMapRef:
            name: crashloop-config
            optional: true
        ports:
        - containerPort: 80
        resources:
          limits:
            memory: "256Mi"
            cpu: "250m"
          requests:
            memory: "64Mi"
            cpu: "50m"
---
apiVersion: v1
kind: Service
metadata:
  name: crashloop-service
  namespace: production
spec:
  selector:
    app: crashloop-service
  ports:
  - port: 80
    targetPort: 80
